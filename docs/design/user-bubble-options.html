<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pi chat — user vs agent bubble color</title>
    <style>
      :root {
        --bg: #1e1e1e;
        --fg: #e8e8e8;
        --dim: #9aa0a6;
        --border: #3a3a3a;
        --accent: #57a6ff;
        --teal: #4ec9b0;
        --sans: -apple-system, 'Segoe UI', system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--sans);
        font-size: 13px;
        line-height: 1.6;
      }
      header {
        border-bottom: 1px solid #2d2d2d;
        padding: 14px 20px;
      }
      h1 {
        margin: 0 0 3px;
        font-size: 15px;
      }
      .sub {
        color: var(--dim);
        font-size: 12px;
      }
      main {
        max-width: 780px;
        margin: 0 auto;
        padding: 22px 20px 80px;
      }
      .opt {
        margin-bottom: 30px;
      }
      .opt h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--dim);
        margin: 0 0 4px;
      }
      .opt p.note {
        color: var(--dim);
        font-size: 11.5px;
        margin: 0 0 10px;
      }
      .role {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--dim);
        margin-bottom: 5px;
      }
      /* agent: plain, on the background (unchanged) */
      .agent .body {
        max-width: 74ch;
      }
      .turn {
        margin-bottom: 14px;
      }
      .user {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
      }
      .user .role {
        align-self: flex-end;
      }
      .user .body {
        width: fit-content;
        max-width: 72%;
        padding: 9px 13px;
        border-radius: 14px 14px 4px 14px;
      }

      /* A — neutral surface (subtle gray fill) */
      .A .user .body {
        background: #2a2a2b;
        border: 1px solid var(--border);
      }
      /* B — subtle blue tint */
      .B .user .body {
        background: rgba(87, 166, 255, 0.14);
        border: 1px solid rgba(87, 166, 255, 0.32);
      }
      /* C — solid accent (strong, high distinction) */
      .C .user .body {
        background: #2f5d86;
        border: 1px solid #3f6f9c;
        color: #eef4fb;
      }
      /* D — teal tint (matches tool accent family) */
      .D .user .body {
        background: rgba(78, 201, 176, 0.13);
        border: 1px solid rgba(78, 201, 176, 0.34);
      }
      /* E — outlined only (current, for comparison) */
      .E .user .body {
        background: transparent;
        border: 1px solid #3a4a5a;
      }
      /* F — left accent bar + faint fill */
      .F .user .body {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: 12px;
      }
      .code {
        margin: 8px 0 0;
        background: #161616;
        border: 1px solid #2d2d2d;
        border-radius: 8px;
        padding: 10px 12px;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>User vs agent bubble — pick the user color</h1>
      <div class="sub">
        Agent stays plain text on the background. The user message gets a distinct treatment so it's
        obvious who said what. Same exchange in 6 options.
      </div>
    </header>
    <main id="main"></main>
    <script>
      const OPTS = [
        ['A', 'Neutral surface', 'Subtle gray fill + hairline. Calm, theme-safe.'],
        ['B', 'Blue tint', 'Faint accent-blue fill + border. Clear, still soft.'],
        ['C', 'Solid accent', 'Filled blue bubble. Strongest distinction (classic chat).'],
        ['D', 'Teal tint', 'Faint teal fill (matches the tool accent family).'],
        ['E', 'Outlined only', 'Current: border, no fill (for comparison).'],
        ['F', 'Left accent bar', 'Faint fill + a blue left bar. Distinct but minimal.'],
      ];
      document.getElementById('main').innerHTML = OPTS.map(
        ([k, name, note]) => `
        <section class="opt ${k}">
          <h2>${k} — ${name}</h2>
          <p class="note">${note}</p>
          <div class="turn user">
            <div class="role">You</div>
            <div class="body">Refactor the auth module and add tests.</div>
          </div>
          <div class="turn agent">
            <div class="role">Pi</div>
            <div class="body">I split parsing from the client and added table-driven tests.
              <div class="code">export function parseToken(raw) { /* ... */ }</div>
            </div>
          </div>
        </section>`
      ).join('');
    </script>
  </body>
</html>
